{% extends "core/base.html" %}

{% block title %}Delete Item{% endblock %}

{% block content %}

<h1 class="text-2xl font-semibold text-zinc-100 mb-4">Delete Item</h1>
<p class="text-zinc-400 mb-8">Are you sure you want to delete <strong class="text-zinc-100">{{ object.name }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <div class="flex items-center gap-4">
        <button type="submit"
            class="bg-red-900 hover:bg-red-800 text-red-400 text-sm font-medium px-6 py-2 rounded transition-colors">
            Yes, Delete
        </button>
        <a href="{% url 'items' %}"
            class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">
            No
        </a>
    </div>
</form>

{% endblock %}
