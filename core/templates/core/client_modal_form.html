<div id="modal-overlay"
    class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div id="modal-box"
        class="bg-zinc-900 border border-zinc-800 rounded-lg p-8 w-full max-w-md">
        <h2 class="text-xl font-semibold text-zinc-100 mb-6">Edit Client</h2>
        <form method="post" action="{% url 'modal_update_client' client.pk %}">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-sm text-zinc-400">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <div class="flex items-center justify-end gap-4 mt-6">
                <button type="button"
                    onclick="document.getElementById('modal-container').innerHTML = ''"
                    class="text-sm text-zinc-400 hover:text-zinc-100 transition-colors">
                    Cancel
                </button>
                <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-6 py-2 rounded transition-colors">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
